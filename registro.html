<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiante - Learn&Choice</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #00ff88;
            --dark-bg: #1a1f2e;
            --darker-bg: #0f1419;
            --card-bg: #252b3b;
        }

        body {
            background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            color: #ffffff;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: var(--dark-bg) !important;
            padding: 1rem 0;
        }

        .navbar-brand {
            color: var(--primary-color) !important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .nav-link {
            color: #ffffff !important;
            margin: 0 1rem;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--primary-color) !important;
        }

        /* Form Section */
        .form-section {
            padding: 4rem 0;
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
        }

        .form-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-title {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            color: #a0aec0;
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-label {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: var(--darker-bg);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: var(--darker-bg);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(0, 255, 136, 0.25);
            color: #ffffff;
        }

        .form-control::placeholder {
            color: #718096;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            z-index: 10;
        }

        .input-icon .form-control {
            padding-left: 45px;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: var(--darker-bg);
            border: none;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            width: 100%;
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4);
        }

        .btn-back {
            background-color: transparent;
            color: #a0aec0;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-back:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* Footer */
        footer {
            background-color: var(--darker-bg);
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .copyright {
            text-align: center;
            color: #718096;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-card {
                padding: 2rem;
                margin: 1rem;
            }
            
            .form-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Learn&Choice</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Info</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Soporte</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Form Section -->
    <section class="form-section">
        <div class="container">
            <div class="form-card">
                <h1 class="form-title">Registro de Estudiante</h1>
                <p class="form-subtitle">Completa el formulario para continuar con tu matrícula académica</p>
                
                <form id="registroForm" action="#" method="POST">
                    <!-- Nombre -->
                    <div class="mb-4">
                        <label for="nombre" class="form-label">
                            <i class="bi bi-person me-2"></i>Nombre Completo
                        </label>
                        <div class="input-icon">
                            <i class="bi bi-person"></i>
                            <input type="text" class="form-control" id="nombre" name="nombre" 
                                   placeholder="Ej: Juan Pérez García" required>
                        </div>
                    </div>

                    <!-- Código del Estudiante -->
                    <div class="mb-4">
                        <label for="codigo" class="form-label">
                            <i class="bi bi-card-heading me-2"></i>Código del Estudiante
                        </label>
                        <div class="input-icon">
                            <i class="bi bi-card-heading"></i>
                            <input type="text" class="form-control" id="codigo" name="codigo" 
                                   placeholder="Ej: 202412345" required>
                        </div>
                    </div>

                    <!-- Correo -->
                    <div class="mb-4">
                        <label for="correo" class="form-label">
                            <i class="bi bi-envelope me-2"></i>Correo Electrónico
                        </label>
                        <div class="input-icon">
                            <i class="bi bi-envelope"></i>
                            <input type="email" class="form-control" id="correo" name="correo" 
                                   placeholder="Ej: juan.perez@universidad.edu" required>
                        </div>
                    </div>

                    <!-- Botón Enviar -->
                    <button type="submit" class="btn btn-submit">
                        <i class="bi bi-send me-2"></i>Enviar Registro
                    </button>

                    <!-- Botón Volver -->
                    <a href="index.html" class="btn btn-back">
                        <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
                    </a>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="copyright">
                <p>&copy; 2024 Learn&Choice. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script para manejar el formulario -->
    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Obtener valores
            const nombre = document.getElementById('nombre').value;
            const codigo = document.getElementById('codigo').value;
            const correo = document.getElementById('correo').value;
            
            // Validación básica
            if(nombre && codigo && correo) {
                // Aquí puedes enviar los datos a tu servidor
                alert('¡Registro enviado con éxito!\n\nNombre: ' + nombre + '\nCódigo: ' + codigo + '\nCorreo: ' + correo);
                
                // Redirigir a otra página después del envío
                // window.location.href = 'confirmacion.html';
                
                // O limpiar el formulario
                this.reset();
            }
        });
    </script>
</body>
</html>
